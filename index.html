<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ I Love You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:radial-gradient(circle,#2b1055,#000);
font-family:Arial,sans-serif;
perspective:1000px;
}

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{
opacity:.2;
transform:scale(.5);
}
100%{
opacity:1;
transform:scale(1.5);
}
}

.text{
position:absolute;
font-size:55px;
font-weight:bold;
text-align:center;
color:white;
text-shadow:
0 0 10px #ff0080,
0 0 20px #ff0080,
0 0 40px #ff0080;
animation:rotate 8s linear infinite;
transform-style:preserve-3d;
z-index:2;
}

@keyframes rotate{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(360deg);
}
}

.heart{
position:absolute;
color:#ff2e63;
animation:fly linear infinite;
filter:drop-shadow(0 0 10px red);
}

@keyframes fly{
0%{
transform:translateY(110vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120px) scale(1.5);
opacity:0;
}
}
</style>

</head>

<body>

<div id="stars"></div>

<div class="text">
❤️ I LOVE YOU ❤️
<br>
💖 Forever 💖
</div>

<script>

// Stars
const stars=document.getElementById("stars");

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*2+"s";

stars.appendChild(s);

}

// Hearts
for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"💖";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*30)+"px";

h.style.animationDuration=(4+Math.random()*4)+"s";

h.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
